<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-96x96.webp" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.webp" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScreenSense AI</title>
    
    <!-- The Pre-Hydration Loader -->
    <style>
      body { 
        margin: 0; 
        background-color: #F8FAFC;
      }
      .ssr-loader-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .ssr-spinner {
        width: 24px;
        height: 24px;
        border: 2px solid #EDE9FE; 
        border-top-color: #6D28D9; 
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 16px;
      }
      
      @keyframes spin { 
        to { transform: rotate(360deg); } 
      }
      @keyframes pulse { 
        0%, 100% { opacity: 1; }
        50% { opacity: .5; } 
      }
    </style>
  </head>
  
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <div id="root">
      <!-- The Pre-Hydration UI -->
      <div class="ssr-loader-container">
        <div class="ssr-spinner"></div>
      </div>
    </div>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
